<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmployeeSync - Dashboard</title>
  
  <link rel="stylesheet" href="../styles/output.css">
  
  <script type="module" src="../../main.js" defer></script>
</head>
<body>

  <header class="navbar-header">
    <div class="brand-container">
      <span class="brand-logo">EmployeeSync</span>
    </div>
    <button id="logout-btn" class="btn-secondary">Logout</button>
  </header>

  <div class="view-content">
    
    <section class="intro-section">
      <h1 class="view-title">Employee Directory</h1>
      <p class="view-subtitle">Manage and view all synchronized personnel records.</p>
    </section>

    <section class="search-section">
      <div class="form-group">
        <label for="search" class="form-label">Search Employees</label>
        <div class="input-wrapper">
          <input 
            type="text" 
            id="search"     
            class="input-field" 
            placeholder="Search by name or email..."
          >
        </div>
      </div>
    </section>

  

    <section id="employee-gallery" class="gallery-grid">
      </section>
  </div>

<script type="module" src="../../main.js" defer></script>

</body>
</html>
