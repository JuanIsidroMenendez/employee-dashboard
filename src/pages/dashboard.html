<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmployeeSync - Dashboard</title>
  
  <link rel="stylesheet" href="../../src/styles/main.css">
  <link rel="stylesheet" href="../../src/styles/dashboard.css">
  
  <script type="module" src="../../main.js" defer></script>
</head>
<body>

  <header class="navbar-header">
    <div class="brand-container">
      <span class="brand-logo">EmployeeSync</span>
    </div>
    <button id="logout-btn" class="btn-secondary">Logout</button>
  </header>

  <div class="view-content">
    
    <section class="intro-section">
      <h1 class="view-title">Employee Directory</h1>
      <p class="view-subtitle">Manage and view all synchronized personnel records.</p>
    </section>

    <section class="search-section">
      <div class="form-group">
        <label for="search" class="form-label">Search Employees</label>
        <div class="input-wrapper">
          <input 
            type="text" 
            id="search-input" 
            class="input-field" 
            placeholder="Search by name or email..."
          >
        </div>
      </div>
    </section>

    <section class="filter-section">
      <nav id="alphabet-filter-nav" class="filter-nav">
        <button class="btn-filter active" data-letter="all">ALL</button>
        <button class="btn-filter" data-letter="a">A</button>
        <button class="btn-filter" data-letter="b">B</button>
        <button class="btn-filter" data-letter="c">C</button>
        <button class="btn-filter" data-letter="d">D</button>
        <button class="btn-filter" data-letter="e">E</button>
        <button class="btn-filter" data-letter="f">F</button>
        <button class="btn-filter" data-letter="g">G</button>
        <button class="btn-filter" data-letter="h">H</button>
      </nav>
    </section>

    <section id="employees-gallery" class="gallery-grid">
      </section>

  </div>

</body>
</html>
